services:
  app:
    build:
      context: .
      target: production
    container_name: laravel_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: kiznetcom
      DB_USERNAME: root
      DB_PASSWORD: ""
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel

  db:
    image: mysql:8.4
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: kiznetcom
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: ""
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel

volumes:
  db_data:
  storage_data:
  logs_data:

networks:
  laravel:
    driver: bridge
